name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate scripts
        run: bash -n install.sh quick-install.sh toggle-notify.sh

      - name: Build release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIST_DIR="dist"
          PKG_DIR="ai-session-notifier-${VERSION}"

          mkdir -p "$DIST_DIR/$PKG_DIR"

          cp install.sh "$DIST_DIR/$PKG_DIR/"
          cp quick-install.sh "$DIST_DIR/$PKG_DIR/"
          cp toggle-notify.sh "$DIST_DIR/$PKG_DIR/"
          cp telegram-notify.plugin.js "$DIST_DIR/$PKG_DIR/"
          cp README.md "$DIST_DIR/$PKG_DIR/"
          cp LICENSE "$DIST_DIR/$PKG_DIR/"

          tar -czf "$DIST_DIR/$PKG_DIR.tar.gz" -C "$DIST_DIR" "$PKG_DIR"
          (cd "$DIST_DIR" && zip -rq "$PKG_DIR.zip" "$PKG_DIR")

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
